name: Build and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.11.1"

      - name: Configure release signing
        shell: bash
        env:
          APP_PURGE_KEYSTORE_BASE64: ${{ secrets.APP_PURGE_KEYSTORE_BASE64 }}
          APP_PURGE_KEYSTORE_PASSWORD: ${{ secrets.APP_PURGE_KEYSTORE_PASSWORD }}
          APP_PURGE_KEY_ALIAS: ${{ secrets.APP_PURGE_KEY_ALIAS }}
          APP_PURGE_KEY_PASSWORD: ${{ secrets.APP_PURGE_KEY_PASSWORD }}
        run: |
          if [ -z "$APP_PURGE_KEYSTORE_BASE64" ] || [ -z "$APP_PURGE_KEYSTORE_PASSWORD" ] || [ -z "$APP_PURGE_KEY_ALIAS" ] || [ -z "$APP_PURGE_KEY_PASSWORD" ]; then
            echo "Release signing secrets are not configured." >&2
            exit 1
          fi

          printf '%s' "$APP_PURGE_KEYSTORE_BASE64" | base64 --decode > app-purge-release.jks
          {
            printf 'storeFile=app-purge-release.jks\n'
            printf 'storeType=JKS\n'
            printf 'storePassword=%s\n' "$APP_PURGE_KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$APP_PURGE_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$APP_PURGE_KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: gradle assembleRelease

      - name: Create release tag
        id: release
        shell: bash
        run: |
          subject="$(git log -1 --pretty=%s)"
          slug="$(printf '%s' "$subject" | tr -cs '[:alnum:]_-' '-' | cut -c1-48 | sed 's/^-//;s/-$//')"
          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          if [ -z "$slug" ]; then
            slug="app-purge"
          fi

          tag="v-${timestamp}-${slug}"
          if ! git check-ref-format --allow-onelevel "$tag"; then
            tag="v-${timestamp}-app-purge"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: App Purge ${{ steps.release.outputs.tag }}
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
